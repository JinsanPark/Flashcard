<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="정처기 용어">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141413" media="(prefers-color-scheme: dark)">
<meta name="format-detection" content="telephone=no">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%232c5e3f'/><text x='90' y='118' font-family='-apple-system,BlinkMacSystemFont,sans-serif' font-size='90' font-weight='800' text-anchor='middle' fill='white'>정</text></svg>">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%232c5e3f'/><text x='32' y='44' font-family='sans-serif' font-size='36' font-weight='800' text-anchor='middle' fill='white'>정</text></svg>">
<title>정처기 실기 용어 플래시카드</title>
<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-2: #f3f3ee;
    --border: #e5e3db;
    --text: #1a1a1a;
    --text-dim: #6b6b6b;
    --text-faint: #9a9a9a;
    --accent: #2c5e3f;
    --accent-hover: #1f4a2f;
    --known: #2c7a4b;
    --review: #b7791f;
    --unknown: #a53e3e;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.08);
  }

  [data-theme="dark"] {
    --bg: #141413;
    --surface: #1f1f1d;
    --surface-2: #2a2a27;
    --border: #363632;
    --text: #e8e8e3;
    --text-dim: #a8a8a2;
    --text-faint: #686864;
    --accent: #5fa87a;
    --accent-hover: #7bc090;
    --known: #5fa87a;
    --review: #d4a858;
    --unknown: #c96a6a;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior-y: contain;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo",
                 "Noto Sans KR", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    min-height: 100dvh;
    transition: background 0.2s, color 0.2s;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Only apply hover effects where hover is actually available */
  @media (hover: none) {
    .icon-btn:hover,
    .btn:hover,
    .chip:hover,
    .stat:hover,
    .filter-toggle:hover,
    .link-btn:hover {
      background: inherit;
      color: inherit;
      border-color: inherit;
      transform: none;
    }
  }

  /* Allow user to select card text if they long-press */
  .card-body { -webkit-user-select: text; user-select: text; }

  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 12px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .header h1 .muted {
    color: var(--text-dim);
    font-weight: 500;
    font-size: 14px;
    margin-left: 6px;
  }

  .header-actions {
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }

  .icon-btn:hover {
    background: var(--surface-2);
    color: var(--text);
    border-color: var(--text-faint);
  }

  /* Stats bar */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
    position: relative;
  }

  .stat:hover {
    border-color: var(--text-faint);
    transform: translateY(-1px);
  }

  .stat.filter-active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .stat.unknown.filter-active {
    border-color: var(--unknown);
    box-shadow: 0 0 0 1px var(--unknown);
    background: color-mix(in srgb, var(--unknown) 8%, var(--surface));
  }
  .stat.review.filter-active {
    border-color: var(--review);
    box-shadow: 0 0 0 1px var(--review);
    background: color-mix(in srgb, var(--review) 8%, var(--surface));
  }
  .stat.known.filter-active {
    border-color: var(--known);
    box-shadow: 0 0 0 1px var(--known);
    background: color-mix(in srgb, var(--known) 8%, var(--surface));
  }
  .stat.total.filter-active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
    background: color-mix(in srgb, var(--accent) 8%, var(--surface));
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .stat.known .stat-value { color: var(--known); }
  .stat.review .stat-value { color: var(--review); }
  .stat.unknown .stat-value { color: var(--unknown); }

  .stat {
    cursor: pointer;
    user-select: none;
    position: relative;
    transition: all 0.15s;
  }
  .stat:hover {
    border-color: var(--text-faint);
    transform: translateY(-1px);
  }
  .stat.filter-active {
    background: var(--surface-2);
  }
  .stat.unknown.filter-active { box-shadow: inset 0 0 0 2px var(--unknown); }
  .stat.review.filter-active { box-shadow: inset 0 0 0 2px var(--review); }
  .stat.known.filter-active { box-shadow: inset 0 0 0 2px var(--known); }
  .stat.total.filter-active { box-shadow: inset 0 0 0 2px var(--accent); }
  .stat.filter-active .stat-label {
    font-weight: 700;
    color: var(--text);
  }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .progress-info .pos {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--text);
  }

  .progress-bar {
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* Category filter */
  .filter-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
    transition: all 0.15s;
  }

  .filter-toggle:hover {
    background: var(--surface-2);
  }

  .filter-toggle .count {
    background: var(--accent);
    color: white;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }

  .filters {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    display: none;
  }

  .filters.open { display: block; }

  .filters-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .filters-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .filters-actions {
    display: flex;
    gap: 6px;
  }

  .link-btn {
    background: transparent;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .link-btn:hover { background: var(--surface-2); }

  .category-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 11px;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip:hover { border-color: var(--text-faint); color: var(--text); }
  .chip.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .chip .c { opacity: 0.7; margin-left: 4px; font-size: 11px; }

  /* Card */
  .card-area {
    perspective: 1200px;
    margin-bottom: 20px;
  }

  .card {
    position: relative;
    width: 100%;
    min-height: 320px;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
    cursor: pointer;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px;
    box-shadow: var(--shadow-md);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
  }

  .card-back { transform: rotateY(180deg); }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .card-cat {
    background: var(--surface-2);
    padding: 3px 8px;
    border-radius: 4px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
    text-transform: none;
    font-size: 11px;
  }

  .card-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 10px 0;
  }

  .card-front .card-body {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }

  .card-back .card-body {
    font-size: 17px;
    line-height: 1.7;
    font-weight: 400;
    color: var(--text);
    text-align: left;
    align-items: flex-start;
    padding-top: 0;
  }

  .card-back .card-body .term {
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .card-hint {
    text-align: center;
    color: var(--text-faint);
    font-size: 11px;
    margin-top: 12px;
  }

  .status-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .status-badge.known {
    background: rgba(44, 122, 75, 0.1);
    color: var(--known);
  }
  .status-badge.review {
    background: rgba(183, 121, 31, 0.1);
    color: var(--review);
  }
  .status-badge.unknown {
    background: rgba(165, 62, 62, 0.1);
    color: var(--unknown);
  }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s;
    font-family: inherit;
  }

  .btn:hover { background: var(--surface-2); }
  .btn:active { transform: translateY(1px); }

  .btn kbd {
    font-size: 10px;
    background: var(--surface-2);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--text-faint);
    font-family: ui-monospace, monospace;
    border: 1px solid var(--border);
    font-weight: 500;
  }

  .btn.unknown:hover { border-color: var(--unknown); color: var(--unknown); }
  .btn.review:hover { border-color: var(--review); color: var(--review); }
  .btn.known:hover { border-color: var(--known); color: var(--known); }

  .nav-controls {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
  }

  .btn.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn.primary:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
  }

  /* Footer info */
  .shortcuts {
    margin-top: 24px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .shortcuts-title {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    font-size: 12px;
  }

  .shortcuts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 6px 16px;
  }

  .shortcut-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .shortcut-item kbd {
    font-family: ui-monospace, monospace;
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .tip-box {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .tip-box:first-child, .tip-box + .tip-box {
    /* if it's the only one or there's another, no double separator */
  }
  .tip-box strong { color: var(--text); font-weight: 600; }
  .tip-box + .tip-box { padding-top: 8px; margin-top: 8px; }

  .mobile-only { display: none; }
  @media (hover: none), (max-width: 600px) {
    .mobile-only { display: block; }
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty p { font-size: 14px; margin-bottom: 16px; }

  /* Mobile */
  @media (max-width: 600px) {
    .app { padding: 12px 12px 40px; }
    .header h1 { font-size: 17px; }
    .header h1 .muted { display: none; }
    .stats { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .stat { padding: 10px 6px; }
    .stat-label { font-size: 10px; }
    .stat-value { font-size: 16px; }
    .card { min-height: 280px; }
    .card-face { padding: 24px 20px; }
    .card-front .card-body { font-size: 22px; }
    .card-back .card-body { font-size: 15px; }
    .controls { gap: 6px; }
    .btn { padding: 13px 8px; font-size: 13px; }
    .btn kbd { display: none; }
    .desktop-only { display: none !important; }
    .shortcuts { padding: 12px 14px; }
    .shortcuts-title { font-size: 11px; }
    .tip-box { padding-top: 0; margin-top: 0; border-top: none; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>정처기 실기 용어<span class="muted">2026년 1회 대비</span></h1>
    <div class="header-actions">
      <button class="icon-btn" id="shuffleBtn" title="섞기 (S)">⇄</button>
      <button class="icon-btn" id="resetBtn" title="진행 초기화">↺</button>
      <button class="icon-btn" id="themeBtn" title="테마 전환">◐</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat total" data-status="all" title="전체 보기 (필터 해제)">
      <div class="stat-label">전체</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat unknown" data-status="unknown" title="모름만 보기 (탭하여 필터)">
      <div class="stat-label">모름</div>
      <div class="stat-value" id="statUnknown">0</div>
    </div>
    <div class="stat review" data-status="review" title="복습만 보기 (탭하여 필터)">
      <div class="stat-label">복습</div>
      <div class="stat-value" id="statReview">0</div>
    </div>
    <div class="stat known" data-status="known" title="암기만 보기 (탭하여 필터)">
      <div class="stat-label">암기</div>
      <div class="stat-value" id="statKnown">0</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span>학습 진행률</span>
      <span class="pos"><span id="posCurrent">0</span> / <span id="posTotal">0</span></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <button class="filter-toggle" id="filterToggle">
    카테고리 필터 <span class="count" id="filterCount">전체</span>
  </button>

  <div class="filters" id="filters">
    <div class="filters-header">
      <span class="filters-title">카테고리 선택</span>
      <div class="filters-actions">
        <button class="link-btn" id="selectAll">전체 선택</button>
        <button class="link-btn" id="selectNone">전체 해제</button>
      </div>
    </div>
    <div class="category-chips" id="categoryChips"></div>
  </div>

  <div class="card-area" id="cardArea">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="status-badge" id="statusFront"></div>
        <div class="card-meta">
          <span class="card-cat" id="catFront">—</span>
          <span id="idxFront">0/0</span>
        </div>
        <div class="card-body" id="frontBody">카드를 불러오는 중…</div>
        <div class="card-hint">탭하거나 Space를 눌러 뒤집기</div>
      </div>
      <div class="card-face card-back">
        <div class="status-badge" id="statusBack"></div>
        <div class="card-meta">
          <span class="card-cat" id="catBack">—</span>
          <span id="idxBack">0/0</span>
        </div>
        <div class="card-body" id="backBody">
          <div>
            <div class="term" id="backTerm"></div>
            <div id="backDef"></div>
          </div>
        </div>
        <div class="card-hint">1·2·3 으로 평가</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn unknown" data-mark="unknown">모름 <kbd>1</kbd></button>
    <button class="btn review" data-mark="review">복습 <kbd>2</kbd></button>
    <button class="btn known" data-mark="known">암기 <kbd>3</kbd></button>
  </div>

  <div class="nav-controls">
    <button class="btn" id="prevBtn">← 이전 <kbd>←</kbd></button>
    <button class="btn primary" id="flipBtn">뒤집기 <kbd>Space</kbd></button>
    <button class="btn" id="nextBtn">다음 → <kbd>→</kbd></button>
  </div>

  <div class="shortcuts">
    <div class="shortcuts-title">단축키 · 팁</div>
    <div class="shortcuts-grid desktop-only">
      <div class="shortcut-item"><span>카드 뒤집기</span><kbd>Space</kbd></div>
      <div class="shortcut-item"><span>이전 카드</span><kbd>←</kbd></div>
      <div class="shortcut-item"><span>다음 카드</span><kbd>→</kbd></div>

// ===== State =====
const STORAGE_KEY = 'jp-flashcards-v1';
const state = loadState();

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    return {
      progress: saved.progress || {}, // { [idx]: 'known'|'review'|'unknown' }
      selectedCats: saved.selectedCats || null, // null = all
      statusFilter: saved.statusFilter || null, // null = all, or array like ['unknown','review']
      theme: saved.theme || 'light',
      order: saved.order || RAW_CARDS.map((_, i) => i),
      current: saved.current || 0
    };
  } catch {
    return { progress: {}, selectedCats: null, statusFilter: null, theme: 'light', order: RAW_CARDS.map((_,i)=>i), current: 0 };
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ===== Categories =====
const ALL_CATEGORIES = [...new Set(RAW_CARDS.map(c => c.cat))];

function getSelectedCats() {
  return state.selectedCats === null ? ALL_CATEGORIES : state.selectedCats;
}

function getCategoryFilteredIndices() {
  const sel = new Set(getSelectedCats());
  return state.order.filter(i => sel.has(RAW_CARDS[i].cat));
}

function getActiveCardIndices() {
  const sel = new Set(getSelectedCats());
  const statusFilter = state.statusFilter;
  return state.order.filter(i => {
    if (!sel.has(RAW_CARDS[i].cat)) return false;
    if (statusFilter && statusFilter.length > 0) {
      const status = state.progress[i] || 'unseen';
      if (!statusFilter.includes(status)) return false;
    }
    return true;
  });
}

let isFlipped = false;

// ===== Render =====
function render() {
  const allInCats = getCategoryFilteredIndices();
  const active = getActiveCardIndices();

  // Stats — always based on category filter (not affected by status filter)
  el.statTotal.textContent = allInCats.length;
  let known = 0, review = 0, unknown = 0;
  allInCats.forEach(i => {
    const s = state.progress[i];
    if (s === 'known') known++;
    else if (s === 'review') review++;
    else if (s === 'unknown') unknown++;
  });
  el.statKnown.textContent = known;
  el.statReview.textContent = review;
  el.statUnknown.textContent = unknown;

  // Highlight active status filter
  document.querySelectorAll('.stat').forEach(s => s.classList.remove('filter-active'));
  const sf = state.statusFilter;
  if (!sf || sf.length === 0) {
    document.querySelector('.stat[data-status="all"]').classList.add('filter-active');
  } else {
    sf.forEach(status => {
      const node = document.querySelector(`.stat[data-status="${status}"]`);
      if (node) node.classList.add('filter-active');
    });
  }

  // Filter count
  if (state.selectedCats === null || state.selectedCats.length === ALL_CATEGORIES.length) {
    el.filterCount.textContent = '전체';
  } else {
    el.filterCount.textContent = `${state.selectedCats.length}개`;
  }

  // Empty state
  if (active.length === 0) {
    let msg = '선택된 카테고리가 없어요';
    let sub = '필터에서 카테고리를 하나 이상 선택해주세요.';
    if (allInCats.length > 0 && sf && sf.length > 0) {
      const labels = { unknown: '모름', review: '복습', known: '암기' };
      const names = sf.map(s => labels[s] || s).join(' · ');
      msg = `${names} 카드가 없어요`;
      sub = '위쪽 "전체"를 눌러 필터를 해제하거나, 다른 상태를 선택해보세요.';
    }
    el.cardArea.innerHTML = `
      <div class="empty">
        <h2>${msg}</h2>
        <p>${sub}</p>
      </div>`;
    el.posCurrent.textContent = '0';
    el.posTotal.textContent = '0';
    el.progressFill.style.width = '0%';
    return;
  }

  // Rebuild card if empty state was shown previously
  if (!document.getElementById('card')) {
    el.cardArea.innerHTML = `
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="status-badge" id="statusFront"></div>
        <div class="card-meta">
          <span class="card-cat" id="catFront">—</span>
          <span id="idxFront">0/0</span>
        </div>
        <div class="card-body" id="frontBody">—</div>
        <div class="card-hint">탭하거나 Space를 눌러 뒤집기</div>
      </div>
      <div class="card-face card-back">
        <div class="status-badge" id="statusBack"></div>
        <div class="card-meta">
          <span class="card-cat" id="catBack">—</span>
          <span id="idxBack">0/0</span>
        </div>
        <div class="card-body" id="backBody">
          <div>
            <div class="term" id="backTerm"></div>
            <div id="backDef"></div>
          </div>
        </div>
        <div class="card-hint">1·2·3 으로 평가</div>
      </div>
    </div>`;
    // Re-bind DOM references
    el.card = document.getElementById('card');
    el.frontBody = document.getElementById('frontBody');
    el.backTerm = document.getElementById('backTerm');
    el.backDef = document.getElementById('backDef');
    el.catFront = document.getElementById('catFront');
    el.catBack = document.getElementById('catBack');
    el.idxFront = document.getElementById('idxFront');
    el.idxBack = document.getElementById('idxBack');
    el.statusFront = document.getElementById('statusFront');
    el.statusBack = document.getElementById('statusBack');
    el.card.addEventListener('click', flip);
  }

  // Ensure current is within bounds
  if (state.current >= active.length) state.current = 0;
  if (state.current < 0) state.current = active.length - 1;

  const cardIdx = active[state.current];
  const card = RAW_CARDS[cardIdx];

  el.frontBody.textContent = card.front;
  el.backTerm.textContent = card.front;
  el.backDef.textContent = card.back;
  el.catFront.textContent = card.cat;
  el.catBack.textContent = card.cat;
  el.idxFront.textContent = `${state.current + 1}/${active.length}`;
  el.idxBack.textContent = `${state.current + 1}/${active.length}`;

  const status = state.progress[cardIdx];
  renderStatusBadge(el.statusFront, status);
  renderStatusBadge(el.statusBack, status);

  el.posCurrent.textContent = state.current + 1;
  el.posTotal.textContent = active.length;

  const studied = allInCats.filter(i => state.progress[i]).length;
  el.progressFill.style.width = allInCats.length ? (studied / allInCats.length * 100) + '%' : '0%';
}

function renderStatusBadge(node, status) {
  node.className = 'status-badge';
  if (!status) { node.textContent = ''; node.style.display = 'none'; return; }
  node.style.display = 'inline-block';
  node.classList.add(status);
  node.textContent = status === 'known' ? '암기' : status === 'review' ? '복습' : '모름';
}

function renderCategoryChips() {
  const sel = new Set(getSelectedCats());
  el.categoryChips.innerHTML = ALL_CATEGORIES.map(cat => {
    const count = RAW_CARDS.filter(c => c.cat === cat).length;
    const active = sel.has(cat);
    return `<div class="chip ${active ? 'active' : ''}" data-cat="${cat}">${cat}<span class="c">${count}</span></div>`;
  }).join('');
  el.categoryChips.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const cat = chip.dataset.cat;
      let cats = new Set(getSelectedCats());
      if (cats.has(cat)) cats.delete(cat); else cats.add(cat);
      state.selectedCats = cats.size === ALL_CATEGORIES.length ? null : Array.from(cats);
      state.current = 0;
      isFlipped = false;
      el.card.classList.remove('flipped');
      saveState();
      renderCategoryChips();
      render();
    });
  });
}

// ===== Actions =====
function flip() {
  isFlipped = !isFlipped;
  el.card.classList.toggle('flipped', isFlipped);
}

function next() {
  const active = getActiveCardIndices();
  if (active.length === 0) return;
  state.current = (state.current + 1) % active.length;
  isFlipped = false;
  el.card.classList.remove('flipped');
  saveState();
  render();
}

function prev() {
  const active = getActiveCardIndices();
  if (active.length === 0) return;
  state.current = (state.current - 1 + active.length) % active.length;
  isFlipped = false;
  el.card.classList.remove('flipped');
  saveState();
  render();
}

function mark(status) {
  const active = getActiveCardIndices();
  if (active.length === 0) return;
  const cardIdx = active[state.current];
  state.progress[cardIdx] = status;
  saveState();

  // If status filter is active and this card no longer matches,
  // the card disappears — render() naturally advances to the next card.
  // If still matches (or no filter), auto-advance to next.
  const willBeFiltered = state.statusFilter
    && state.statusFilter.length > 0
    && !state.statusFilter.includes(status);

  render();
  if (!willBeFiltered) {
    setTimeout(() => next(), 200);
  }
}

function toggleStatusFilter(status) {
  if (status === 'all') {
    state.statusFilter = null;
  } else {
    let sf = state.statusFilter ? [...state.statusFilter] : [];
    const idx = sf.indexOf(status);
    if (idx >= 0) sf.splice(idx, 1);
    else sf.push(status);
    state.statusFilter = sf.length === 0 ? null : sf;
  }
  state.current = 0;
  isFlipped = false;
  if (el.card) el.card.classList.remove('flipped');
  saveState();
  render();
}

function shuffle() {
  for (let i = state.order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.order[i], state.order[j]] = [state.order[j], state.order[i]];
  }
  state.current = 0;
  isFlipped = false;
  el.card.classList.remove('flipped');
  saveState();
  render();
}

function resetProgress() {
  if (!confirm('학습 진행 상황(암기/복습/모름 표시)을 모두 초기화할까요?')) return;
  state.progress = {};
  saveState();
  render();
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  saveState();
}

// ===== Init =====
function init() {
  // Theme
  document.documentElement.setAttribute('data-theme', state.theme);

  // Card click
  el.card.addEventListener('click', flip);
  el.flipBtn.addEventListener('click', (e) => { e.stopPropagation(); flip(); });
  el.prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prev(); });
  el.nextBtn.addEventListener('click', (e) => { e.stopPropagation(); next(); });
  el.shuffleBtn.addEventListener('click', shuffle);
  el.resetBtn.addEventListener('click', resetProgress);
  el.themeBtn.addEventListener('click', toggleTheme);

  document.querySelectorAll('[data-mark]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      mark(btn.dataset.mark);
    });
  });

  // Status filter via stat cards
  document.querySelectorAll('.stat[data-status]').forEach(s => {
    s.addEventListener('click', () => {
      toggleStatusFilter(s.dataset.status);
    });
  });

  // Filters
  el.filterToggle.addEventListener('click', () => {
    el.filters.classList.toggle('open');
  });
  el.selectAll.addEventListener('click', () => {
    state.selectedCats = null;
    state.current = 0;
    isFlipped = false;
    el.card.classList.remove('flipped');
    saveState();
    renderCategoryChips();
    render();
  });
  el.selectNone.addEventListener('click', () => {
    state.selectedCats = [];
    state.current = 0;
    saveState();
    renderCategoryChips();
    render();
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case ' ':
        e.preventDefault();
        flip();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        prev();
        break;
      case 'ArrowRight':
        e.preventDefault();
        next();
        break;
      case '1':
        e.preventDefault();
        mark('unknown');
        break;
      case '2':
        e.preventDefault();
        mark('review');
        break;
      case '3':
        e.preventDefault();
        mark('known');
        break;
      case 's': case 'S':
        e.preventDefault();
        shuffle();
        break;
      case 'f': case 'F':
        e.preventDefault();
        el.filters.classList.toggle('open');
        break;
    }
  });

  renderCategoryChips();
  render();

  // Touch swipe — left/right for prev/next, tap still flips
  let touchStartX = 0, touchStartY = 0, touchStartTime = 0, swiping = false;
  el.cardArea.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
    swiping = false;
  }, { passive: true });

  el.cardArea.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) {
      swiping = true;
    }
  }, { passive: true });

  el.cardArea.addEventListener('touchend', (e) => {
    if (!swiping) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dt = Date.now() - touchStartTime;
    // Must be a decisive horizontal swipe: at least 50px, within 600ms
    if (Math.abs(dx) >= 50 && dt <= 600) {
      if (dx < 0) next(); else prev();
      // Prevent tap-flip from firing after a swipe
      swiping = false;
    }
  });

  // Swallow click on card if it came from a swipe
  el.cardArea.addEventListener('click', (e) => {
    if (swiping) { e.stopPropagation(); swiping = false; }
  }, true);
}

init();
</script>
</body>
</html>
